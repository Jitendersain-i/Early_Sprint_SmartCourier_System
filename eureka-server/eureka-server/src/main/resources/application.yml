server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:localhost}
  client:
    register-with-eureka: false   # This IS the registry, not a client
    fetch-registry: false
    service-url:
      defaultZone: http://${EUREKA_HOSTNAME:localhost}:8761/eureka/
  server:
    wait-time-in-ms-when-sync-empty: 0
    enable-self-preservation: false   # Disable in dev so stale instances clear fast

management:
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  level:
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN
